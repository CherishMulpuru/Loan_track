spring:
  application:
    name: loantrack-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/loantrack}
    username: ${DB_USERNAME:loantrack}
    password: ${DB_PASSWORD:loantrack}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}

loantrack:
  jwt:
    secret: ${JWT_SECRET:loantrack-super-secret-key-change-in-production-min-256-bits}
    expiration-ms: ${JWT_EXPIRATION:86400000}  # 24 hours

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.loantrack: DEBUG
    org.springframework.security: INFO
