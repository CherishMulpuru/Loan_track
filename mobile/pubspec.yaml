name: loantrack_mobile
description: LoanTrack — Borrower Loan Management Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  dio: ^5.4.0

  # State management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Navigation
  go_router: ^12.1.3

  # Secure storage for JWT
  flutter_secure_storage: ^9.0.0

  # Charts
  fl_chart: ^0.66.2

  # Date formatting
  intl: ^0.19.0

  # UI
  cupertino_icons: ^1.0.6
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.1

flutter:
  uses-material-design: true
