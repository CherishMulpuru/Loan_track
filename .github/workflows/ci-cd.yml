name: LoanTrack CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend ────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend — Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: loantrack_test
          POSTGRES_USER: loantrack
          POSTGRES_PASSWORD: loantrack
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        working-directory: backend
        run: mvn test -Dspring.profiles.active=test
        env:
          DB_URL: jdbc:postgresql://localhost:5432/loantrack_test
          DB_USERNAME: loantrack
          DB_PASSWORD: loantrack
          JWT_SECRET: ci-test-secret-key-min-256-bits-for-testing-only

      - name: Build JAR
        working-directory: backend
        run: mvn package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

  # ─── Web Frontend ────────────────────────────────────────────────────────────
  web-test:
    name: Web — Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-web/package-lock.json

      - name: Install dependencies
        working-directory: frontend-web
        run: npm ci

      - name: Lint
        working-directory: frontend-web
        run: npm run lint

      - name: Build
        working-directory: frontend-web
        run: npm run build
        env:
          VITE_API_URL: https://api.loantrack.io/api/v1

  # ─── Mobile ──────────────────────────────────────────────────────────────────
  mobile-test:
    name: Mobile — Flutter Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.x'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Analyze
        working-directory: mobile
        run: flutter analyze

      - name: Run tests
        working-directory: mobile
        run: flutter test

  # ─── Deploy (main branch only) ───────────────────────────────────────────────
  deploy:
    name: Deploy to AWS
    needs: [backend-test, web-test, mobile-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Download backend JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/target

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend Docker image
        working-directory: backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/loantrack-backend:$IMAGE_TAG .
          docker push $ECR_REGISTRY/loantrack-backend:$IMAGE_TAG
          docker tag $ECR_REGISTRY/loantrack-backend:$IMAGE_TAG \
                     $ECR_REGISTRY/loantrack-backend:latest
          docker push $ECR_REGISTRY/loantrack-backend:latest

      - name: Deploy frontend to S3
        working-directory: frontend-web
        env:
          VITE_API_URL: https://api.loantrack.io/api/v1
        run: |
          npm ci
          npm run build
          aws s3 sync dist/ s3://loantrack-web --delete
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster loantrack-cluster \
            --service loantrack-backend \
            --force-new-deployment
