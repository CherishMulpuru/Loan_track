

services:
  db:
    image: postgres:15-alpine
    container_name: loantrack_db
    environment:
      POSTGRES_DB: loantrack
      POSTGRES_USER: loantrack
      POSTGRES_PASSWORD: loantrack
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loantrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loantrack_backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/loantrack
      DB_USERNAME: loantrack
      DB_PASSWORD: loantrack
      JWT_SECRET: local-dev-secret-change-in-production-256bits
      JWT_EXPIRATION: 86400000
    restart: unless-stopped

  web:
    image: node:20-alpine
    container_name: loantrack_web
    working_dir: /app
    volumes:
      - ./frontend-web:/app
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8080/api/v1
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

volumes:
  pgdata:
